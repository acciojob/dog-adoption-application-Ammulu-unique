<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<h1>Dog Adoption Application</h1>
	<form method="post">
		<label for="name">Name</label>
		<input id="name" type="text" placeholder="Name">
		<label for="phone">Phone Number</label>
		<input id="phone" type="text" placeholder="Phone Number">
		<label for="address">Address</label>
		<input id="address" type="text" placeholder="Address">
		<label for="checkbox">Have you ever lived with a Dog before?</label>
		<input id="checkbox" type="checkbox">
		<label for="multiselect">Please select your preferred breeds</label>
		<select id="multiselect">
			<option>Golden retriver</option>
			<option>Gernam shapered</option>
			<option>Pomeranian</option>
		</select>
		<button type="submit" id="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
